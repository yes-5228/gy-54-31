services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=sqlite:////data/grades.db
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - backend-data:/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  backend-data:
